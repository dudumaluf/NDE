# Configuração do pipeline (doc 02 §3 — requisito 3: tudo config-driven).
# Chaves de API vivem no .env, nunca aqui.

channel:
  # Canal "Afinal, o que somos nós?" — resolvido a partir dos vídeos do patch.
  url: ""            # preenchido no primeiro `acervo scan --resolve <video_id>`

paths:
  data: data
  export: export
  db: acervo.db

fetch:
  audio_format: "m4a" # bestaudio nesse container; cai para o melhor disponível

transcribe:
  backend: fal          # fal | local
  model: fal-ai/wizper  # rápido/barato; só aceita chunk_level=segment (verificado)
  language: pt
  chunk_level: segment  # suficiente p/ beats+quotes; word exigiria fal-ai/whisper
  diarize: false        # ligar quando quisermos separar entrevistador × depoente

extract:
  backend: fal        # fal | anthropic
  model: anthropic/claude-sonnet-4.5  # via openrouter/router (any-llm foi deprecado)
  max_retries: 2

embeddings:
  backend: local
  model: intfloat/multilingual-e5-large

analyze:
  umap_random_state: 42
  knn_k: 8
