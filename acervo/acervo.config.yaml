# Configuração do pipeline (doc 02 §3 — requisito 3: tudo config-driven).
# Chaves de API vivem no .env, nunca aqui.

channel:
  # Canal "Afinal, o que somos nós?" — resolvido a partir dos vídeos do patch.
  url: ""            # preenchido no primeiro `acervo scan --resolve <video_id>`

paths:
  data: data
  export: export
  db: acervo.db

fetch:
  audio_format: "m4a" # bestaudio nesse container; cai para o melhor disponível

transcribe:
  backend: fal           # fal | local
  # MODO PREMIUM (decisão 2026-07-10): whisper clássico com timestamps por
  # palavra + diarização (separa entrevistador × depoente). Para o modo
  # rápido/barato voltar: model=fal-ai/wizper, chunk_level=segment, diarize=false.
  model: fal-ai/whisper
  language: pt
  chunk_level: word
  diarize: true
  prompt: "Entrevista em português brasileiro sobre experiência de quase-morte (EQM), canal Afinal o que somos nós."

extract:
  backend: fal        # fal | anthropic
  model: anthropic/claude-sonnet-4.5  # via openrouter/router (any-llm foi deprecado)
  max_retries: 2

embeddings:
  backend: local
  model: intfloat/multilingual-e5-large

analyze:
  umap_random_state: 42
  knn_k: 8
